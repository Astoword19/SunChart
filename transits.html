<script type="module">

let swe = null;
const SE_GREG_CAL = 1;
const SEFLG_SPEED = 256;

const BODIES = [
  { key: 'sun',    id: 0,  name: 'Солнце' },
  { key: 'moon',   id: 1,  name: 'Луна' },
  { key: 'mercury', id: 2, name: 'Меркурий' },
  { key: 'venus',  id: 3,  name: 'Венера' },
  { key: 'mars',   id: 4,  name: 'Марс' },
  { key: 'jupiter', id: 5, name: 'Юпитер' },
  { key: 'saturn', id: 6,  name: 'Сатурн' },
  { key: 'uranus', id: 7,  name: 'Уран' },
  { key: 'neptune', id: 8, name: 'Нептун' },
  { key: 'pluto',  id: 9,  name: 'Плутон' },
  { key: 'north_node', id: 11, name: 'Сев. узел (Раху)' },
  { key: 'lilith', id: 12, name: 'Лилит' },
  { key: 'chiron', id: 15, name: 'Хирон' },
];

const SIGNS = ['Овен','Телец','Близнецы','Рак','Лев','Дева',
               'Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'];

const ASPECT_DEFS = [
  { name: 'Соединение',  angle: 0,   orb: 8, sym: '☌' },
  { name: 'Секстиль',    angle: 60,  orb: 5, sym: '⚹' },
  { name: 'Квадратура',  angle: 90,  orb: 7, sym: '□' },
  { name: 'Тригон',      angle: 120, orb: 7, sym: '△' },
  { name: 'Оппозиция',   angle: 180, orb: 8, sym: '☍' },
];

function norm(d) { let r = d % 360; return r < 0 ? r + 360 : r; }

function fmtDeg(deg) {
  const d = norm(deg);
  const idx = Math.floor(d / 30), rem = d % 30;
  const dd = Math.floor(rem), mm = Math.floor((rem % 1) * 60), ss = Math.floor(((rem % 1) * 60 % 1) * 60);
  return `${dd}\u00B0${String(mm).padStart(2,'0')}'${String(ss).padStart(2,'0')}" ${SIGNS[idx]}`;
}

function sweCalcUt(jd, body) {
  const fn = swe.calc_ut || swe.swe_calc_ut;
  const r = fn.call(swe, jd, body, SEFLG_SPEED);
  if (r && r.data && Array.isArray(r.data)) return r.data;
  if (r && r.xx) return r.xx;
  if (Array.isArray(r)) return r;
  if (r && r.longitude !== undefined)
    return [r.longitude, r.latitude || 0, r.distance || 0, r.longitudeSpeed || r.speedLong || 0];
  if (r && typeof r === 'object') {
    const vals = Object.values(r).filter(v => typeof v === 'number');
    if (vals.length >= 4) return vals;
  }
  return [0, 0, 0, 0];
}

// Селена
function calcSelena(jd) {
  return norm(242.606 + 0.14084795 * (jd - 2451545.0));
}

async function initSWE() {
  const el = document.getElementById('sweStatus');
  try {
    const mod = await import('https://cdn.jsdelivr.net/gh/prolaxu/swisseph-wasm@main/src/swisseph.js');
    const SwissEph = mod.default || mod;
    swe = new SwissEph();
    await swe.initSwissEph();
    el.textContent = ''; el.className = 'status ok';
  } catch(e) {
    console.error('[SWE] Init failed:', e);
    el.textContent = 'ошибка'; el.className = 'status err';
  }
}

// Установить сегодняшнюю дату
const today = new Date();
document.getElementById('date').value = today.toISOString().split('T')[0];

window.calculate = function() {
  const errEl = document.getElementById('error');
  errEl.textContent = '';
  if (!swe) { errEl.textContent = 'Swiss Ephemeris ещё загружается...'; return; }

  const dateVal = document.getElementById('date').value;
  const timeVal = document.getElementById('time').value;
  const tzOffset = parseInt(document.getElementById('tz').value);
  if (!dateVal || !timeVal) { errEl.textContent = 'Укажите дату и время.'; return; }

  const [year, month, day] = dateVal.split('-').map(Number);
  const [hour, minute] = timeVal.split(':').map(Number);

  // Перевод в UTC
  const utcHour = hour - tzOffset + minute / 60;
  let utcDay = day, utcMonth = month, utcYear = year;
  let h = utcHour;
  if (h < 0) { h += 24; utcDay--; }
  if (h >= 24) { h -= 24; utcDay++; }
  // Простая коррекция дня (без полного календаря — достаточно для JD)

  const jdFn = swe.julday || swe.swe_julday;
  const jd = jdFn.call(swe, utcYear, utcMonth, utcDay, h, SE_GREG_CAL);

  const L = [];
  const tzStr = (tzOffset >= 0 ? '+' : '') + tzOffset;

  L.push('══════════ ТРАНЗИТЫ ══════════');
  L.push('');
  L.push(`Дата: ${dateVal}`);
  L.push(`Время: ${timeVal} (UTC${tzStr})`);
  L.push('');
  L.push('────────── ПОЛОЖЕНИЯ ПЛАНЕТ ──────────');
  L.push('');

  const positions = [];

  for (const b of BODIES) {
    const data = sweCalcUt(jd, b.id);
    const lon = norm(data[0]);
    const speed = data[3] || 0;
    const retro = speed < 0 ? ' (R)' : '';
    positions.push({ name: b.name, lon, speed });
    L.push(`${b.name}: ${fmtDeg(lon)}${retro}`);
  }

  // Южный узел
  const rahuPos = positions.find(p => p.name === 'Сев. узел (Раху)');
  if (rahuPos) {
    const ketuLon = norm(rahuPos.lon + 180);
    positions.push({ name: 'Юж. узел (Кету)', lon: ketuLon, speed: 0 });
    L.push(`Юж. узел (Кету): ${fmtDeg(ketuLon)} (R)`);
  }

  // Селена
  const selenaLon = calcSelena(jd);
  positions.push({ name: 'Селена', lon: selenaLon, speed: 0 });
  L.push(`Селена: ${fmtDeg(selenaLon)}`);

  // Аспекты между транзитными планетами
  L.push('');
  L.push('────────── АСПЕКТЫ ──────────');
  L.push('');

  const aspects = [];
  for (let i = 0; i < positions.length; i++) {
    for (let j = i + 1; j < positions.length; j++) {
      const n1 = positions[i].name, n2 = positions[j].name;
      if ((n1 === 'Сев. узел (Раху)' && n2 === 'Юж. узел (Кету)') || (n1 === 'Юж. узел (Кету)' && n2 === 'Сев. узел (Раху)')) continue;
      let d = Math.abs(positions[i].lon - positions[j].lon);
      if (d > 180) d = 360 - d;
      for (const a of ASPECT_DEFS) {
        const orb = Math.abs(d - a.angle);
        if (orb <= a.orb) {
          aspects.push({
            p1: positions[i].name, p2: positions[j].name,
            type: a.name, sym: a.sym, orb: orb.toFixed(2)
          });
        }
      }
    }
  }

  aspects.sort((a, b) => parseFloat(a.orb) - parseFloat(b.orb));

  if (aspects.length === 0) L.push('Аспекты не обнаружены');
  else aspects.forEach(a => L.push(`${a.p1} ${a.type} ${a.p2} (орб ${a.orb}°)`));

  L.push('');
  L.push('══════════════════════════════');

  document.getElementById('output').value = L.join('\n');
  document.getElementById('resultBlock').style.display = 'block';
  document.getElementById('emptyBlock').style.display = 'none'; // Скрываем brand-panel как в index.html
};

window.copyText = function() {
  const ta = document.getElementById('output');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Скопировано'; btn.className = 'copy-btn copied';
    setTimeout(() => { btn.textContent = '⎘ Копировать всё'; btn.className = 'copy-btn'; }, 2500);
  });
};

initSWE();
</script>
